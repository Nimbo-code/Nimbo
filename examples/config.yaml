# Example Nimbo configuration file
# Use with: Nimbo.from_config("config.yaml", base_model_name, dataset)

device:
  device: null  # null = auto-detect (cuda > mps > cpu)
  device_map: null  # For multi-GPU: "auto", "balanced"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules: null  # null = auto-detect based on model architecture
  modules_to_save: null

training:
  output_dir: ./nimbo_output
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  max_steps: -1
  learning_rate: 0.0001
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  warmup_steps: 0
  optim: adamw_torch
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true  # Use bf16 if supported
  gradient_checkpointing: true
  max_length: 1024
  logging_steps: 10
  logging_first_step: true
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping_patience: 3
  early_stopping_threshold: 0.0
  seed: 42
  dataloader_num_workers: 4
  dataloader_pin_memory: true

inference:
  max_new_tokens: 256
  do_sample: true
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  num_beams: 1
  num_return_sequences: 1
  stream: false
  use_cache: true

quantization:
  load_in_4bit: false
  load_in_8bit: false
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
